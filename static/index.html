<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小陈陈的俄语单词本</title>
<link rel="stylesheet" href="/style.css?v=1.12">
</head>
<body>

<header class="app-header">
  <div class="brand">
    <h1>小陈陈的俄语单词本</h1>
    <span id="version-text" class="version-badge">v1.12</span>
  </div>
  <div class="header-actions">
    <select id="theme-select" class="theme-select" title="页面模式">
      <option value="light">白天</option>
      <option value="dark">黑夜</option>
      <option value="eye">护眼</option>
    </select>
    <button id="api-status-btn" class="api-status" title="点击设置 DeepSeek API Key">
      <span id="api-status-icon">⚠️</span>
      <span id="api-status-text">未激活</span>
    </button>
    <button id="feedback-btn" class="feedback-btn" title="反馈错误">反馈</button>
  </div>
</header>

<!-- API Key 设置弹窗 -->
<div id="settings-overlay" class="overlay" style="display:none">
  <div class="settings-modal">
    <h3>DeepSeek API 设置</h3>
    <p class="hint">输入 API Key 后自动翻译俄语单词和句式。使用 Flash 模型，成本极低。</p>
    <input type="password" id="api-key-input" placeholder="sk-...">
    <div class="settings-actions">
      <button id="save-key-btn" class="btn-primary">保存并激活</button>
      <button id="close-settings-btn" class="btn-secondary">取消</button>
    </div>
    <div id="settings-msg"></div>
  </div>
</div>

<nav class="tabs">
  <button class="tab active" data-tab="add-entry">录入</button>
  <button class="tab" data-tab="word-list">单词库</button>
  <button class="tab" data-tab="sentence-list">句式库</button>
  <button class="tab" data-tab="review">复习</button>
  <button class="tab" data-tab="learn">学习</button>
</nav>

<main>

  <!-- ====== 统一录入 ====== -->
  <section id="tab-add-entry" class="tab-content active">
    <div class="form-card">
      <h2>录入俄语内容</h2>
      <p class="hint">输入单词或句子，自动完成翻译、纠错和例句整理。</p>
      <div class="form-row">
        <input type="text" id="entry-input" placeholder="输入俄语单词或句子，如 книга 或 Я читаю книгу" autofocus>
        <button id="add-entry-btn" class="btn-primary">录入</button>
      </div>
      <div id="entry-result" class="result-area"></div>
    </div>
  </section>

  <!-- ====== 单词库 ====== -->
  <section id="tab-word-list" class="tab-content">
    <div class="search-bar">
      <input type="text" id="word-search" placeholder="搜索单词（俄语或中文）...">
      <span id="word-count"></span>
      <button id="dedup-words-btn" class="btn-small btn-tool">合并重复</button>
      <button id="retro-examples-btn" class="btn-small btn-tool">一键例句</button>
    </div>
    <div id="word-list-container" class="list-container"></div>
  </section>

  <!-- ====== 句式库 ====== -->
  <section id="tab-sentence-list" class="tab-content">
    <div class="search-bar">
      <input type="text" id="sentence-search" placeholder="搜索句式...">
      <span id="sentence-count"></span>
      <button id="dedup-sentences-btn" class="btn-small btn-tool">合并重复</button>
      <button id="retro-correct-btn" class="btn-small btn-tool">纠正语法</button>
    </div>
    <div id="sentence-list-container" class="list-container"></div>
  </section>

  <!-- ====== 复习模式 ====== -->
  <section id="tab-review" class="tab-content">
    <div id="review-container">
      <div id="review-start">
        <button id="start-review-btn" class="btn-primary btn-large">开始复习</button>
        <div id="review-stats" class="stats"></div>
      </div>
      <div id="review-question" style="display:none">
        <div class="question-label" id="question-label"></div>
        <div class="question-text" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <div id="review-feedback"></div>
        <div class="center-actions">
          <button id="stop-review-btn" class="btn-small btn-muted">停止本轮</button>
        </div>
      </div>
    </div>
  </section>

  <!-- ====== 学习 ====== -->
  <section id="tab-learn" class="tab-content">
    <div class="learn-subtabs">
      <button class="learn-tab active" data-learn="word">学习单词</button>
      <button class="learn-tab" data-learn="sentence">学习句式</button>
    </div>
    <div class="learn-level">
      <label>难度：</label>
      <select id="learn-level">
        <option value="catti3">CATTI 三级（中等）</option>
        <option value="catti2">CATTI 二级（较难）</option>
      </select>
    </div>
    <div id="learn-area" class="form-card">
      <button id="start-learn-btn" class="btn-primary btn-large">开始学习</button>
      <div id="learn-question-area" style="display:none">
        <div class="question-text" id="learn-question-text"></div>
        <div class="options" id="learn-options"></div>
        <div id="learn-feedback"></div>
        <div class="learn-stop-actions">
          <button id="learn-next-btn" class="btn-small btn-secondary" style="display:none">下一题</button>
          <button id="stop-learn-btn" class="btn-small btn-muted">停止</button>
        </div>
      </div>
    </div>
  </section>

</main>

<script src="/script.js?v=1.12"></script>
</body>
</html>
